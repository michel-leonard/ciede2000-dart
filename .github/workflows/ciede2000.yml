name: CIEDE2000 Test in Dart

on:
  workflow_dispatch:

env:
  n_csv_lines: 100000000

jobs:
  test-ciede2000-dart:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - name: 🛠️ Prepare the Dart test script
        run: |
           printf '%s\n' "import 'dart:io';" '' > ciede2000-driver.dart
           cat ciede2000.dart >> ciede2000-driver.dart
           printf '%s\n' '' \
           'void main(List<String> args) {' \
           '  final filename = args[0];' \
           '  final lines = File(filename).readAsLinesSync();' \
           '  final canonical = 1 < args.length;' \
           '  for (var line in lines) {' \
           "    final v = line.split(',').map(double.parse).toList();" \
           '    final deltaE = ciede2000(v[0], v[1], v[2], v[3], v[4], v[5], v[6], v[7], v[8], canonical);' \
           "    print('\${line},\${deltaE}');" \
           '  }' \
           '}' \
           '' >> ciede2000-driver.dart

      - name: 📦 Set up Dart and GCC
        run: |
          if ! command -v dart > /dev/null; then
            wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://dl-ssl.google.com/linux/linux_signing_key.pub -O- | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
            echo "deb [signed-by=/usr/share/keyrings/dart.gpg]" "https://storage.googleapis.com/download.dartlang.org/linux/debian stable main" |
            sudo tee /etc/apt/sources.list.d/dart_stable.list
            sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes dart
            # sudo ln -s /usr/lib/dart/bin/dart /usr/local/bin/dart
            echo "/usr/lib/dart/bin" >> $GITHUB_PATH
          fi
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: |
            gcc --version
            gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in Dart and stream to verifier
        run: |
            dart --version
            dart ciede2000-driver.dart test-cases.csv             | ./ciede2000-native --precision 11 > summary-simplified.txt
            dart ciede2000-driver.dart test-cases.csv --canonical | ./ciede2000-native --precision 11 > summary-canonical.txt
            wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
